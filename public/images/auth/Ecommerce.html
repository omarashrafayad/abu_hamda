<!DOCTYPE html>
<html lang="en" dir="ltr" class="light" style="color-scheme: light;">
<head>
    <meta charset="UTF-8">
    <title>Add Product Dashboard</title>
</head>
<body>
    <plasmo-csui id="plasmo-inspector">
        <template shadowrootmode="open">
            <style>
                @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:wght@300;400;500&display=swap");

                /* Tailwind CSS Reset & Variables */
                *, :before, :after, ::backdrop {
                    --tw-border-spacing-x: 0;
                    --tw-border-spacing-y: 0;
                    --tw-translate-x: 0;
                    --tw-translate-y: 0;
                    --tw-rotate: 0;
                    --tw-skew-x: 0;
                    --tw-skew-y: 0;
                    --tw-scale-x: 1;
                    --tw-scale-y: 1;
                    --tw-ring-offset-width: 0px;
                    --tw-ring-offset-color: #fff;
                    --tw-ring-color: #3b82f680;
                    --tw-ring-offset-shadow: 0 0 #0000;
                    --tw-ring-shadow: 0 0 #0000;
                    --tw-shadow: 0 0 #0000;
                    --tw-shadow-colored: 0 0 #0000;
                }

                html, :host {
                    -webkit-text-size-adjust: 100%;
                    tab-size: 4;
                    font-family: ui-sans-serif, system-ui, sans-serif;
                    line-height: 1.5;
                }

                body { line-height: inherit; margin: 0; }

                /* Utility Classes */
                .flex { display: flex; }
                .flex-col { flex-direction: column; }
                .items-center { align-items: center; }
                .justify-between { justify-content: space-between; }
                .rounded-lg { border-radius: .5rem; }
                .border { border-width: 1px; }
                
                /* Custom Theme Colors */
                .bg-peeper-purple { background-color: rgb(93 45 230); }
                .text-peeper-purple { color: rgb(93 45 230); }
                .bg-surface-gray { background-color: rgb(245 245 245); }
                .border-gray-200 { border-color: rgb(229 231 235); }

                /* Shadow & Effects */
                .shadow { box-shadow: 0 1px 3px #0000001f; }
                .dropdown-shadow { box-shadow: 0 4px 4px -4px #00000040; }
                
                /* Layout Helpers */
                .w-full { width: 100%; }
                .h-screen { height: 100vh; }
                .p-4 { padding: 1rem; }

                /* Interaction States - Repaired */
                .hover\:border-gray-300:hover { border-color: rgb(209 213 219); }
                .hover\:bg-active-tab:hover { background-color: #5d2de614; }
                .transition-all { transition-property: all; transition-timing-function: cubic-bezier(.4, 0, .2, 1); transition-duration: .15s; }

                /* Custom Extension Styles */
                .transparency-grid {
                    background-color: #fff;
                    background-image: linear-gradient(45deg, #d4d4d40f 25%, #0000 25%), 
                                      linear-gradient(-45deg, #d4d4d481 25%, #0000 25%);
                    background-size: 20px 20px;
                }
            </style>
            
            <div class="flex flex-col h-screen bg-surface-gray font-roboto">
                <div class="p-6">
                    <h1 class="text-2xl font-bold text-peeper-dark-gray">Add New Product</h1>
                    <p class="text-sm text-peeper-gray mb-4">Fill in the details below to list your item.</p>
                    
                    <div class="w-full max-w-lg bg-white border border-gray-200 rounded-xl p-4 shadow">
                        <div class="my-2">
                            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500">Product Name</label>
                            <input type="text" class="w-full border-b border-gray-200 py-2 outline-none focus:border-peeper-purple transition-colors" placeholder="e.g. Minimalist Watch">
                        </div>
                        <button class="mt-4 w-full bg-peeper-purple text-white py-2 rounded-lg font-medium hover:bg-opacity-80 transition-all">
                            Save Product
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </plasmo-csui>
</body>
</html>
